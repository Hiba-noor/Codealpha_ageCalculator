<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3D Age Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#f78ddd,#8fd3f4,#a1ffce);
background-size:400% 400%;
animation:bgMove 12s infinite alternate;
}

@keyframes bgMove{
0%{background-position:left}
100%{background-position:right}
}

.container{
width:380px;
padding:40px;
text-align:center;
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.2);
border-radius:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.2),
inset 5px 5px 10px rgba(255,255,255,0.4),
inset -5px -5px 10px rgba(0,0,0,0.1);
}

h1{
margin-bottom:25px;
font-weight:600;
}

.input-group{
display:flex;
gap:10px;
margin-bottom:25px;
}

.input-box{
flex:1;
position:relative;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:15px;
outline:none;
background:rgba(255,255,255,0.6);
box-shadow:inset 4px 4px 8px rgba(0,0,0,0.1),
inset -4px -4px 8px rgba(255,255,255,0.6);
font-size:14px;
text-align:center;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:20px;
font-size:16px;
font-weight:600;
color:#fff;
cursor:pointer;
background:linear-gradient(135deg,#667eea,#a24b91);
box-shadow:0 8px 20px rgba(0,0,0,0.3);
transition:transform .2s,box-shadow .2s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 12px 25px rgba(0,0,0,0.4);
}

.result{
margin-top:25px;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,0.25);
box-shadow:inset 4px 4px 10px rgba(0,0,0,0.1),
inset -4px -4px 10px rgba(255,255,255,0.5);
font-size:18px;
}

.result span{
font-weight:600;
}
</style>
</head>

<body>

<div class="container">
<h1>Age Calculator</h1>

<div class="input-group">
<div class="input-box">
<input type="number" id="day" placeholder="Day">
</div>
<div class="input-box">
<input type="number" id="month" placeholder="Month">
</div>
<div class="input-box">
<input type="number" id="year" placeholder="Year">
</div>
</div>

<button onclick="calculateAge()">Calculate Age</button>

<div class="result" id="result">
Your age will appear here
</div>
</div>

<script>
function calculateAge(){
let d=document.getElementById('day').value;
let m=document.getElementById('month').value;
let y=document.getElementById('year').value;

if(!d||!m||!y){
document.getElementById('result').innerHTML='Please enter complete date';
return;
}

let birthDate=new Date(y,m-1,d);
let today=new Date();

let years=today.getFullYear()-birthDate.getFullYear();
let months=today.getMonth()-birthDate.getMonth();
let days=today.getDate()-birthDate.getDate();

if(days<0){
months--;
days+=30;
}

if(months<0){
years--;
months+=12;
}

document.getElementById('result').innerHTML=
`<span>${years}</span> Years <span>${months}</span> Months <span>${days}</span> Days`;
}
</script>

<footer class="footer">
  <div class="footer-content">
    <p>© 2026 <strong>Age Calculator</strong> • Create by HibaNoor</p>
  
  </div>
</footer>

<style>
.footer{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
justify-content:center;
padding:14px 10px;
backdrop-filter:blur(10px);
background:rgba(255,255,255,0.15);
border-top:1px solid rgba(255,255,255,0.3);
box-shadow:0 -5px 20px rgba(0,0,0,0.15);
}

.footer-content{
text-align:center;
color:#ffffff;
font-size:14px;
}

.footer-sub{
font-size:12px;
opacity:0.8;
margin-top:2px;
}
</style>

</body>
</html>
